[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
check_untyped_defs = true
strict_equality = true
show_error_codes = true
explicit_package_bases = true
mypy_path = "src"

[[tool.mypy.overrides]]
module = [
    "asyncpg",
    "telethon",
    "telethon.*",
    "pytest",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "core.task_registry.store_base",
    "core.task_registry.store_tasks",
    "core.task_registry.store_comments",
    "core.task_registry.store_checklists",
]
disallow_any_unimported = false

[[tool.mypy.overrides]]
module = [
    "asyncpg",
    "telegram_mcp.telegram_client",
    "telegram_mcp.mcp.server",
    "core.orchestra_thread.store",
    "core.orchestra_thread.store_base",
    "core.orchestra_thread.store_agents",
    "core.orchestra_thread.store_idempotency",
    "core.orchestra_thread.store_thread_query",
    "core.orchestra_thread.store_thread_creation",
    "core.orchestra_thread.store_thread_events",
    "core.orchestra_thread.store_delivery",
    "core.orchestra_thread.store_notifications",
    "core.telegram_events.listener",
    "core.telegram_events.service",
]
disallow_any_unimported = false

[tool.flake8]
max-line-length = 100
max-complexity = 10
ignore = ["E501", "W503"]

[tool.isort]
profile = "wemake"
line_length = 100
