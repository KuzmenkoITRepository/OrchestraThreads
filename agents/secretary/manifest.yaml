slug: secretary
display_name: Main Secretary
status: active
auto_start: true

agent:
  working_dir: /workspace/agents/secretary
  http_endpoint: http://{container_name}:8787
  system_prompt_file: system_prompt.md
  allowed_peer_agent_slugs:
    - orchestra

runtime:
  driver: docker
  image: orchestra-threads:local
  command:
    - python
    - -m
    - core.orchestra_agents.backends.sgr.main
  mounts:
    - type: bind
      source: ../../
      target: /workspace
      mode: rw
  env:
    AGENT_HTTP_HOST: 0.0.0.0
    AGENT_HTTP_PORT: "8787"
    PYTHONPATH: /workspace/src:/workspace
    OMNIROUTE_URL: http://orchestra-omniroute:20128
    LOG_LEVEL: INFO
    TELEGRAM_EVENTS_URL: http://telegram-events:8787
    TELEGRAM_CHAT_ID_IVAN: "748976004"
    ORCHESTRA_THREADS_AGENT_SLUG: secretary
    ORCHESTRA_AGENT_SLUG: secretary
  env_passthrough:
    - OMNIROUTE_URL
    - OMNIROUTE_API_KEY
    - LLM_CLIENT_MODEL
    - LLM_CLIENT_ROUTE_POLICY
    - LLM_CLIENT_TIMEOUT_SECONDS
    - LLM_CLIENT_TEMPERATURE
    - LLM_CLIENT_MAX_TOKENS
    - LLM_CLIENT_REASONING_EFFORT
    - LLM_CLIENT_REASONING_SUMMARY
    - SGR_MAX_REASONING_STEPS
    - SGR_MAX_DIRECT_TEXT_RETRIES
    - TELEGRAM_EVENTS_URL
    - TELEGRAM_CHAT_ID_IVAN
    - LOG_LEVEL

backend:
  type: sgr_minimax
  config:
    route_policy: codex_only
    model: cx/gpt-5.4-mini
    temperature: 0.2
    max_tokens: 2000
    timeout_seconds: 300
    react_to_inactive: true
    max_reasoning_steps: 32
    max_direct_text_retries: 8
    mcp_servers:
      - name: send_telegram_message
        module: telegram_mcp.mcp.server
        class: TelegramMCPServer
        schema_fn: telegram_tool_definitions
      - name: orchestra_threads
        module: core.orchestra_thread.mcp.server
        class: OrchestraThreadsMCPServer
        schema_fn: orchestra_threads_tool_definitions
      - name: orchestra_memory
        module: core.orchestra_memory.mcp.server
        class: OrchestraMemoryMCPServer
        schema_fn: orchestra_memory_tool_definitions
