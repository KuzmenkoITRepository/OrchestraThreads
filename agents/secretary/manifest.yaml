slug: secretary
display_name: Main Secretary
status: active
auto_start: true

agent:
  working_dir: /workspace/agents/secretary
  http_endpoint: http://{container_name}:8787
  system_prompt_file: system_prompt.md
  allowed_peer_agent_slugs:
    - orchestra

runtime:
  driver: docker
  image: orchestra-agent-mux-runtime:latest
  command:
    - python
    - -m
    - core.orchestra_agents.agent_mux_runtime.bootstrap
  mounts:
    - type: bind
      source: ../../
      target: /workspace
      mode: rw
  env:
    AGENT_HTTP_HOST: 0.0.0.0
    AGENT_HTTP_PORT: "8787"
    PYTHONPATH: /workspace/src:/workspace
    OMNIROUTE_URL: http://orchestra-omniroute:20128
    LOG_LEVEL: INFO
    TELEGRAM_EVENTS_URL: http://telegram-events:8787
    TELEGRAM_CHAT_ID_IVAN: "748976004"
    ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
    ORCHESTRA_THREADS_AGENT_SLUG: secretary
  env_passthrough:
    - OMNIROUTE_URL
    - OMNIROUTE_API_KEY
    - LLM_CLIENT_MODEL
    - LLM_CLIENT_ROUTE_POLICY
    - LLM_CLIENT_TIMEOUT_SECONDS
    - LLM_CLIENT_TEMPERATURE
    - LLM_CLIENT_MAX_TOKENS
    - LLM_CLIENT_REASONING_EFFORT
    - LLM_CLIENT_REASONING_SUMMARY
    - TELEGRAM_EVENTS_URL
    - TELEGRAM_CHAT_ID_IVAN
    - LOG_LEVEL

backend:
  type: agent_mux
  config:
    role: worker
    artifact_root: /workspace/agents/secretary/runtime_state/artifacts
    llm_route_policy: codex_only
    model: cx/gpt-5.4-mini
    timeout_seconds: 180
    require_tool_call_for_response: true
    react_to_inactive: true
    max_reasoning_steps: 8
    max_direct_text_retries: 2
    mcp_servers:
      - name: send_telegram_message
        command: python
        args:
          - -m
          - telegram_mcp.mcp.server
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: true
        env:
          TELEGRAM_EVENTS_URL: http://telegram-events:8787
          TELEGRAM_CHAT_ID_IVAN: "748976004"
          PYTHONPATH: "{pythonpath}"
      - name: orchestra_threads
        command: python
        args:
          - -m
          - core.orchestra_thread.mcp.server
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: true
        enabled_tools:
          - thread_send
          - thread_status
          - thread_current
          - thread_expand
          - thread_guide
          - thread_peers
        env:
          ORCHESTRA_THREADS_AGENT_SLUG: "{agent_slug}"
          ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
          ORCHESTRA_THREADS_ACTIVE_CONTEXT_PATH: "{active_context_path}"
          PYTHONPATH: "{pythonpath}"
      - name: orchestra_memory
        command: python
        args:
          - -m
          - core.orchestra_memory.mcp.server
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: true
        enabled_tools:
          - memory_remember
          - memory_search
          - memory_delete
          - memory_clear
        env:
          ORCHESTRA_AGENT_SLUG: "{agent_slug}"
          ORCHESTRA_MEMORY_URL: http://orchestra-memory:8793
          PYTHONPATH: "{pythonpath}"
