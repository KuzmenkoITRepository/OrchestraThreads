slug: secretary
display_name: Secretary Agent Mux
status: active

agent:
  working_dir: /workspace/agents/secretary
  http_endpoint: http://{container_name}:8787
  system_prompt_file: system_prompt.md

runtime:
  driver: docker
  image: orchestra-agent-mux-runtime:latest
  command:
    - python
    - -m
    - agent_runtime.main
  mounts:
    - type: bind
      source: ../../
      target: /workspace
      mode: rw
  env:
    AGENT_HTTP_HOST: 0.0.0.0
    AGENT_HTTP_PORT: "8787"
    PYTHONPATH: /workspace/src:/workspace/agents/secretary
    ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
    LLM_PROXY_URL: http://llm-proxy:8787
    LLM_PROXY_ENABLED: "true"
    LLM_PROXY_API_KEY: llm-proxy
    AGENT_MUX_BINARY: agent-mux
    AGENT_MUX_STATE_ROOT: /workspace/agents/secretary/runtime_state
    LOG_LEVEL: INFO
  env_passthrough:
    - ORCHESTRA_THREADS_URL
    - LLM_PROXY_URL
    - LLM_PROXY_ENABLED
    - LLM_PROXY_API_KEY
    - LLM_CLIENT_MODEL
    - LLM_CLIENT_ROUTE_POLICY
    - AGENT_MUX_BINARY
    - AGENT_MUX_STATE_ROOT
    - TELEGRAM_API_ID
    - TELEGRAM_API_HASH
    - TELEGRAM_SESSION_STRING
    - TELEGRAM_CHAT_ID_IVAN
    - LOG_LEVEL

backend:
  type: agent_mux
  config:
    artifact_root: /workspace/agents/secretary/runtime_state/artifacts
    llm_route_policy: managed_auto
    model: gpt-5.4-mini
    timeout_seconds: 180
    require_tool_call_for_response: true
    mcp_servers:
      - name: orchestra_threads
        command: python
        args:
          - -m
          - core.orchestra_thread.mcp_server
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: false
        enabled_tools:
          - thread_send
          - thread_status
          - thread_current
          - thread_expand
          - thread_guide
        env:
          ORCHESTRA_THREADS_AGENT_SLUG: "{agent_slug}"
          ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
          ORCHESTRA_THREADS_ACTIVE_CONTEXT_PATH: "{active_context_path}"
          PYTHONPATH: "{pythonpath}"
      - name: telegram
        command: python
        args:
          - -m
          - telegram_mcp
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: true
        env:
          TELEGRAM_API_ID: "{env.TELEGRAM_API_ID}"
          TELEGRAM_API_HASH: "{env.TELEGRAM_API_HASH}"
          TELEGRAM_SESSION_STRING: "{env.TELEGRAM_SESSION_STRING}"
          TELEGRAM_CHAT_ID_IVAN: "{env.TELEGRAM_CHAT_ID_IVAN}"
          LOG_LEVEL: "{env.LOG_LEVEL}"
          PYTHONPATH: "{pythonpath}"
