slug: sgr
display_name: SGR Minimax Example
status: active

agent:
  working_dir: /workspace
  http_endpoint: http://{container_name}:8787
  system_prompt_file: system_prompt.md

runtime:
  driver: docker
  image: orchestra-threads:local
  command:
    - python
    - -m
    - agent_runtime.main
  mounts:
    - type: bind
      source: ../../
      target: /workspace
      mode: rw
  env:
    AGENT_HTTP_HOST: 0.0.0.0
    AGENT_HTTP_PORT: "8787"
    PYTHONPATH: /workspace/src:/workspace
    OMNIROUTE_URL: http://orchestra-omniroute:20128
    LLM_CLIENT_ROUTE_POLICY: codex_only
    LLM_CLIENT_MODEL: cx/gpt-5.4-mini
    LOG_LEVEL: INFO
  env_passthrough:
    - OMNIROUTE_URL
    - OMNIROUTE_API_KEY
    - LLM_CLIENT_MODEL
    - LLM_CLIENT_ROUTE_POLICY
    - LLM_CLIENT_TIMEOUT_SECONDS
    - LLM_CLIENT_TEMPERATURE
    - LLM_CLIENT_MAX_TOKENS
    - LLM_CLIENT_REASONING_EFFORT
    - LLM_CLIENT_REASONING_SUMMARY
    - SGR_MAX_REASONING_STEPS
    - SGR_MAX_DIRECT_TEXT_RETRIES
    - LOG_LEVEL

backend:
  type: sgr_minimax
  config:
    route_policy: codex_only
    model: cx/gpt-5.4-mini
    temperature: 0.2
    max_tokens: 600
    timeout_seconds: 120
    react_to_inactive: true
    max_reasoning_steps: 8
    max_direct_text_retries: 2
