slug: orchestra
display_name: Orchestra Agent Mux
status: active

agent:
  working_dir: /workspace/agents/orchestra
  http_endpoint: http://{container_name}:8787
  system_prompt_file: system_prompt.md

runtime:
  driver: docker
  image: orchestra-agent-mux-runtime:latest
  command:
    - python
    - -m
    - agent_runtime.main
  mounts:
    - type: bind
      source: ../../
      target: /workspace
      mode: rw
  env:
    AGENT_HTTP_HOST: 0.0.0.0
    AGENT_HTTP_PORT: "8787"
    PYTHONPATH: /workspace/src:/workspace/agents/orchestra
    ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
    LLM_PROXY_URL: http://orchestra-wet:8100
    LLM_PROXY_ENABLED: "true"
    LLM_PROXY_API_KEY: llm-proxy
    AGENT_MUX_BINARY: agent-mux
    AGENT_MUX_STATE_ROOT: /workspace/agents/orchestra/runtime_state
    LOG_LEVEL: INFO
  env_passthrough:
    - ORCHESTRA_THREADS_URL
    - LLM_PROXY_URL
    - LLM_PROXY_ENABLED
    - LLM_PROXY_API_KEY
    - LLM_CLIENT_MODEL
    - LLM_CLIENT_ROUTE_POLICY
    - AGENT_MUX_BINARY
    - AGENT_MUX_STATE_ROOT
    - LOG_LEVEL

backend:
  type: agent_mux
  config:
    role: worker
    artifact_root: /workspace/agents/orchestra/runtime_state/artifacts
    llm_route_policy: minimax_only
    model: MiniMax-M2.7
    timeout_seconds: 180
    require_tool_call_for_response: true
    mcp_servers:
      - name: orchestra_threads
        command: python
        args:
          - -m
          - core.orchestra_thread.mcp_server
        cwd: "{working_dir}"
        startup_timeout_sec: 15
        required: false
        enabled: true
        enabled_tools:
          - thread_send
          - thread_status
          - thread_current
          - thread_expand
          - thread_guide
        env:
          ORCHESTRA_THREADS_AGENT_SLUG: "{agent_slug}"
          ORCHESTRA_THREADS_URL: http://orchestra-threads:8788
          ORCHESTRA_THREADS_ACTIVE_CONTEXT_PATH: "{active_context_path}"
          PYTHONPATH: "{pythonpath}"
