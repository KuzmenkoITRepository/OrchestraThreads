repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
        exclude: ^src/core/omniroute/|^test_task_registry_manual\.py$
      - id: ruff-format
        exclude: ^src/core/omniroute/|^test_task_registry_manual\.py$

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: env PYTHONPATH=src .venv/bin/mypy
        language: system
        types: [python]
        args:
          - --strict
          - --no-warn-unused-ignores
          - --show-error-codes
        exclude: ^src/core/omniroute/|^test_task_registry_manual\.py$
          - aiohttp>=3.9,<4
          - httpx>=0.27,<1
          - types-PyYAML
          - types-requests

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        exclude: ^src/core/omniroute/|^test_task_registry_manual\.py$
        additional_dependencies:
          - wemake-python-styleguide==1.6.1
        args: [--select=WPS]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^\.codex$'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
