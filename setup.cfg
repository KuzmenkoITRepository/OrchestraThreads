[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    .venv-contract-test,
    .eggs,
    *.egg,
    build,
    dist,
    .ruff_cache,
    .pytest_cache,
    test_task_registry_manual.py,
    agents/orchestra/runtime_state,
    agents/secretary/runtime_state,
    environments/,
    src/core/llm_proxy
    src/core/orchestra_memory/tests/test_memory_secretary_e2e.py
    agents/secretary/runtime_state,
    src/core/llm_proxy

ignore =
    E501,
    W503,
    WPS305,
    WPS306,
    WPS110,
    WPS111,
    WPS226,
    WPS237,
    WPS326,
    WPS432,
    WPS440,
    WPS602

per-file-ignores =
    __init__.py:F401,WPS412
    src/core/orchestra_agents/backends/agent_mux/backend.py:WPS201,WPS202,WPS210,WPS214
    src/core/orchestra_agents/backends/sgr/mcp_loader.py:WPS202,WPS210,WPS221,WPS231,WPS234
    src/core/orchestra_agents/skills/classifier.py:WPS210,WPS234,WPS358
    src/core/orchestra_agents/skills/registry.py:WPS407
    src/core/orchestra_agents/tests/test_agent_mux_skill_tools.py:WPS338
    src/core/orchestra_memory/tests/*.py:WPS118,WPS202,WPS210,WPS213,WPS214,WPS217,WPS221,WPS407,WPS476
    src/core/orchestra_memory/tests/test_memory_secretary_e2e.py:WPS210,WPS213,WPS229,WPS336,WPS476,WPS504
