[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    .venv-contract-test,
    .eggs,
    *.egg,
    build,
    dist,
    .ruff_cache,
    .pytest_cache,
    test_task_registry_manual.py,
    agents/orchestra/runtime_state,
    agents/secretary/runtime_state,
    src/core/llm_proxy

ignore =
    E501,
    W503,
    WPS305,
    WPS306,
    WPS110,
    WPS111,
    WPS226,
    WPS237,
    WPS326,
    WPS432,
    WPS440,
    WPS602

per-file-ignores =
    __init__.py:F401
    src/core/telegram_events/test_e2e_real.py:WPS202,WPS210,WPS221,WPS214,ANN201
