[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    .eggs,
    *.egg,
    build,
    dist,
    .ruff_cache,
    .pytest_cache

ignore =
    E501,
    W503,
    WPS305,
    WPS306,
    WPS110,
    WPS111,
    WPS226,
    WPS237,
    WPS326,
    WPS432,
    WPS440,
    WPS602

per-file-ignores =
    __init__.py:F401,WPS412
    tests/*.py:WPS118,WPS202,WPS204,WPS218,WPS432,WPS442
