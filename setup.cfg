[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    .eggs,
    *.egg,
    build,
    dist,
    .ruff_cache,
    .pytest_cache,
    test_task_registry_manual.py,
    agents/orchestra/runtime_state,
    agents/secretary/runtime_state,
    src/core/llm_proxy

ignore =
    E501,
    W503,
    WPS305,
    WPS306,
    WPS110,
    WPS111,
    WPS226,
    WPS237,
    WPS326,
    WPS432,
    WPS440,
    WPS602

per-file-ignores =
    __init__.py:F401,WPS412
    src/core/orchestra_thread/tests/fixtures/__init__.py:F401,WPS410,WPS412
    tests/*.py:WPS118,WPS202,WPS204,WPS210,WPS218,WPS221,WPS338,WPS432,WPS442
    */tests/*.py:WPS118,WPS202,WPS204,WPS210,WPS218,WPS221,WPS338,WPS432,WPS442
    src/core/scheduler_cron/tests/*.py:WPS114,WPS118,WPS202,WPS204,WPS210,WPS213,WPS214,WPS217,WPS218,WPS221,WPS229,WPS230,WPS231,WPS234,WPS235,WPS243,WPS336,WPS338,WPS342,WPS358,WPS420,WPS421,WPS430,WPS432,WPS441,WPS442,WPS476,WPS501,WPS527,WPS615
    src/core/scheduler_cron/bootstrap_ops.py:WPS221
    src/core/scheduler_cron/executor_runtime.py:WPS211,WPS235
    src/core/scheduler_cron/scheduler_engine_runtime.py:WPS214,WPS221,WPS229,WPS234,WPS235
    src/core/scheduler_cron/service_runtime.py:WPS202,WPS217,WPS338
    src/core/scheduler_cron/store_jobs.py:WPS115,WPS202,WPS210,WPS211,WPS221,WPS336
    src/core/scheduler_cron/store_runs.py:WPS115,WPS210
