[flake8]
max-line-length = 100
max-complexity = 10
exclude =
    .git,
    __pycache__,
    .venv,
    .venv-contract-test,
    .eggs,
    *.egg,
    build,
    dist,
    .ruff_cache,
    .pytest_cache,
    test_task_registry_manual.py,
    agents/orchestra/runtime_state,
    agents/secretary/runtime_state,
    environments/,
    src/core/llm_proxy
    agents/secretary/runtime_state,
    src/core/llm_proxy

ignore =
    E501,
    W503,
    WPS305,
    WPS306,
    WPS110,
    WPS111,
    WPS226,
    WPS237,
    WPS326,
    WPS432,
    WPS440,
    WPS602

per-file-ignores =
    __init__.py:F401,WPS412
    # Test files with complex fixtures - WPS violations acceptable for test coverage
    src/core/orchestra_memory/tests/*.py:WPS214,WPS217,WPS202,WPS118,WPS221,WPS407
    src/core/orchestra_agents/backends/agent_mux/backend.py:WPS201
    src/core/orchestra_memory/tests/test_memory_mcp_server.py:WPS214
    src/core/orchestra_memory/tests/*.py:WPS214,WPS217,WPS202,WPS118,WPS221,WPS407
