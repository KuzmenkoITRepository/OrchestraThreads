[defaults]
engine = "codex"
model = "gpt-5.4"
effort = "high"
sandbox = "danger-full-access"
response_max_chars = 32000
max_depth = 2
allow_subdispatch = false

[liveness]
heartbeat_interval_sec = 15
silence_warn_seconds = 90
silence_kill_seconds = 180

[timeout]
low = 120
medium = 600
high = 1800
xhigh = 2700
grace = 60

[models]
codex = ["gpt-5.4", "gpt-5.4-mini", "gpt-5.3-codex-spark", "gpt-5.2-codex", "MiniMax-M2.7"]

[roles.worker]
engine = "codex"
model = "gpt-5.4"
effort = "high"
timeout = 1800
system_prompt_file = "prompts/worker.md"

[roles.worker.variants.mini]
model = "gpt-5.4-mini"
effort = "medium"
timeout = 900
