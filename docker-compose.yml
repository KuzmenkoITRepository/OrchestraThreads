x-agent-common: &agent-common
  build: .
  image: orchestra-threads:${OT_TAG:-local}
  depends_on:
    orchestra-threads:
      condition: service_healthy
  environment:
    PYTHONPATH: /app/src
  tty: true
  stdin_open: true
  init: true
  restart: "no"
  profiles:
    - agents

services:
  vault:
    image: hashicorp/vault:1.16
    ports:
      - "127.0.0.1:${OT_PORT_VAULT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    command:
      - vault
      - server
      - -config=/vault/config/vault-config.hcl
    volumes:
      - ./deploy/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - vault-data:/vault/file
    profiles:
      - vault
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestra_threads}
      POSTGRES_USER: ${POSTGRES_USER:-orchestra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orchestra}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  orchestra-threads:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${OT_PORT_THREADS:-8788}:8788"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ORCHESTRA_THREADS_HOST: ${ORCHESTRA_THREADS_HOST:-0.0.0.0}
      ORCHESTRA_THREADS_PORT: ${ORCHESTRA_THREADS_PORT:-8788}
      ORCHESTRA_THREADS_DATABASE_URL: ${ORCHESTRA_THREADS_DATABASE_URL:-postgresql://orchestra:orchestra@postgres:5432/orchestra_threads}
      ORCHESTRA_THREADS_DB_SCHEMA: ${ORCHESTRA_THREADS_DB_SCHEMA:-public}
      ORCHESTRA_THREADS_DB_MIN_POOL_SIZE: ${ORCHESTRA_THREADS_DB_MIN_POOL_SIZE:-5}
      ORCHESTRA_THREADS_DB_MAX_POOL_SIZE: ${ORCHESTRA_THREADS_DB_MAX_POOL_SIZE:-20}
      ORCHESTRA_THREADS_DB_COMMAND_TIMEOUT_SECONDS: ${ORCHESTRA_THREADS_DB_COMMAND_TIMEOUT_SECONDS:-10}
      ORCHESTRA_THREADS_AGENT_LEASE_SECONDS: ${ORCHESTRA_THREADS_AGENT_LEASE_SECONDS:-30}
      ORCHESTRA_THREADS_DELIVERY_POLL_INTERVAL_SECONDS: ${ORCHESTRA_THREADS_DELIVERY_POLL_INTERVAL_SECONDS:-1}
      ORCHESTRA_THREADS_INACTIVITY_TIMEOUT_SECONDS: ${ORCHESTRA_THREADS_INACTIVITY_TIMEOUT_SECONDS:-60}
      ORCHESTRA_THREADS_RETRY_BASE_SECONDS: ${ORCHESTRA_THREADS_RETRY_BASE_SECONDS:-2}
      ORCHESTRA_THREADS_RETRY_MAX_SECONDS: ${ORCHESTRA_THREADS_RETRY_MAX_SECONDS:-30}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8788/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  orchestra-memory:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    user: root
    ports:
      - "${OT_PORT_MEMORY:-8793}:8793"
    environment:
      PYTHONPATH: /app/src
      ORCHESTRA_MEMORY_HOST: 0.0.0.0
      ORCHESTRA_MEMORY_PORT: 8793
      ORCHESTRA_MEMORY_STORAGE_PATH: /var/lib/orchestra_memory/palace
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - orchestra-memory-data:/var/lib/orchestra_memory
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8793/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - python
      - -m
      - core.orchestra_memory.service_main
    restart: unless-stopped

  orchestra-agents:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    user: root
    ports:
      - "${OT_PORT_AGENTS:-8790}:8790"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /app/src
      ORCHESTRA_AGENTS_HOST: 0.0.0.0
      ORCHESTRA_AGENTS_PORT: 8790
      ORCHESTRA_AGENTS_MANIFESTS_DIR: ${OT_WORKSPACE_DIR:-.}/agents
      ORCHESTRA_AGENTS_DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-orchestrathreads}_default
      OMNIROUTE_URL: ${OMNIROUTE_URL:-}
      OMNIROUTE_API_KEY: ${OMNIROUTE_API_KEY:-}
      LLM_CLIENT_MODEL: ${LLM_CLIENT_MODEL:-}
      LLM_CLIENT_ROUTE_POLICY: ${LLM_CLIENT_ROUTE_POLICY:-}
      LLM_CLIENT_TIMEOUT_SECONDS: ${LLM_CLIENT_TIMEOUT_SECONDS:-}
      LLM_CLIENT_TEMPERATURE: ${LLM_CLIENT_TEMPERATURE:-}
      LLM_CLIENT_MAX_TOKENS: ${LLM_CLIENT_MAX_TOKENS:-}
      LLM_CLIENT_REASONING_EFFORT: ${LLM_CLIENT_REASONING_EFFORT:-}
      LLM_CLIENT_REASONING_SUMMARY: ${LLM_CLIENT_REASONING_SUMMARY:-}
      SGR_MAX_REASONING_STEPS: ${SGR_MAX_REASONING_STEPS:-}
      SGR_MAX_DIRECT_TEXT_RETRIES: ${SGR_MAX_DIRECT_TEXT_RETRIES:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_CHAT_ID_IVAN: ${TELEGRAM_CHAT_ID_IVAN}
    volumes:
      - ${OT_WORKSPACE_DIR:-.}:${OT_WORKSPACE_MOUNT:-${PWD}}
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      orchestra-threads:
        condition: service_healthy
      orchestra-memory:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8790/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - python
      - -m
      - core.orchestra_agents.service_main
    restart: unless-stopped

  orchestra-omniroute:
    image: diegosouzapw/omniroute:latest
    networks:
      - default
    ports:
      - "${OT_PORT_OMNIROUTE:-20229}:20128"
    environment:
      PORT: 20128
      HOSTNAME: 0.0.0.0
      INITIAL_PASSWORD: ${OMNIROUTE_INITIAL_PASSWORD:-CHANGEME}
    volumes:
      - ${OT_OMNIROUTE_DATA_DIR:-./runtime_state/orchestrathreads/omniroute-data}:/app/data
    restart: unless-stopped

  orchestra-wet:
    image: wet-proxy:latest
    depends_on:
      orchestra-omniroute:
        condition: service_started
    networks:
      - default
    ports:
      - "${OT_PORT_WET:-8100}:8100"
      - "${OT_PORT_WET_ADMIN:-8101}:8101"
    environment:
      WET_MODE: auto
      WET_PORT: 8100
      WET_ADMIN_PORT: 8101
      WET_UPSTREAM: http://orchestra-omniroute:20128
      WET_OPENAI_UPSTREAM: http://orchestra-omniroute:20128
      WET_CODEX_UPSTREAM: http://orchestra-omniroute:20128
    volumes:
      - ${OT_OMNIROUTE_WET_DIR:-./runtime_state/orchestrathreads/omniroute-wet}:/root/.wet
    command: serve --host 0.0.0.0 --port 8100 --mode auto --upstream http://orchestra-omniroute:20128
    restart: unless-stopped

  task-registry:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${OT_PORT_TASK_REGISTRY:-8791}:8791"
    environment:
      PYTHONPATH: /app/src
      TASK_REGISTRY_HOST: ${TASK_REGISTRY_HOST:-0.0.0.0}
      TASK_REGISTRY_PORT: ${TASK_REGISTRY_PORT:-8791}
      TASK_REGISTRY_DATABASE_URL: ${TASK_REGISTRY_DATABASE_URL:-postgresql://orchestra:orchestra@postgres:5432/orchestra_threads}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8791/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - python
      - -m
      - core.task_registry.service_main
    restart: unless-stopped

  scheduler-cron:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${OT_PORT_SCHEDULER:-8792}:8792"
    environment:
      PYTHONPATH: /app/src
      SCHEDULER_CRON_HOST: ${SCHEDULER_CRON_HOST:-0.0.0.0}
      SCHEDULER_CRON_PORT: ${SCHEDULER_CRON_PORT:-8792}
      SCHEDULER_CRON_DATABASE_URL: ${SCHEDULER_CRON_DATABASE_URL:-postgresql://orchestra:orchestra@postgres:5432/orchestra_threads}
      SCHEDULER_CRON_DB_SCHEMA: ${SCHEDULER_CRON_DB_SCHEMA:-public}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8792/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - python
      - -m
      - core.scheduler_cron.service_main
    restart: unless-stopped

  events-engine:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      orchestra-agents:
        condition: service_healthy
    ports:
      - "${OT_PORT_EVENTS:-8789}:8789"
    networks:
      - default
    environment:
      PYTHONPATH: /app/src
      EVENTS_ENGINE_HOST: 0.0.0.0
      EVENTS_ENGINE_PORT: 8789
      ORCHESTRA_AGENTS_URL: http://orchestra-agents:8790
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NO_PROXY: localhost,127.0.0.1,orchestra-agents,orchestra-threads,events-engine,telegram-events,postgres,langfuse-postgres,langfuse
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8789/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - python
      - -m
      - core.events_engine.service_main
    restart: unless-stopped

  telegram-events:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      events-engine:
        condition: service_healthy
    networks:
      - default
    ports:
      - "${OT_PORT_TELEGRAM_EVENTS:-8793}:8787"
    environment:
      PYTHONPATH: /app/src
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING:-}
      TELEGRAM_SESSION_FILE: ${TELEGRAM_SESSION_FILE:-sessions/telegram.session}
      TELEGRAM_EVENTS_HTTP_HOST: 0.0.0.0
      TELEGRAM_EVENTS_HTTP_PORT: "8787"
      EVENTS_ENGINE_URL: http://events-engine:8789
      TARGET_AGENT_SLUG: ${TARGET_AGENT_SLUG:-secretary}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NO_PROXY: localhost,127.0.0.1,orchestra-agents,orchestra-threads,events-engine,telegram-events,postgres,langfuse-postgres,langfuse
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys,os,urllib.request; os.environ['no_proxy']='127.0.0.1,localhost'; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8787/healthz').status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ${OT_SESSIONS_DIR:-./runtime_state/orchestrathreads/sessions}:/app/sessions
    command:
      - python
      - -m
      - core.telegram_events.service_main
    restart: unless-stopped

  telegram-mcp:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      telegram-events:
        condition: service_healthy
    networks:
      - default
    environment:
      PYTHONPATH: /app/src
      TELEGRAM_EVENTS_URL: http://telegram-events:8787
      TELEGRAM_CHAT_ID_IVAN: ${TELEGRAM_CHAT_ID_IVAN:-748976004}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command:
      - python
      - -m
      - telegram_mcp
    restart: unless-stopped
    stdin_open: true
    tty: false

  telegram-bot-listener:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      events-engine:
        condition: service_healthy
    ports:
      - "${OT_PORT_TELEGRAM_BOT_LISTENER:-8792}:8791"
    networks:
      - default
    environment:
      PYTHONPATH: /app/src
      TELEGRAM_BOT_LISTENER_HOST: 0.0.0.0
      TELEGRAM_BOT_LISTENER_PORT: 8791
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_ALLOWED_USER_IDS: ${TELEGRAM_BOT_ALLOWED_USER_IDS}
      TELEGRAM_BOT_LISTENER_API_TOKEN: ${TELEGRAM_BOT_LISTENER_API_TOKEN}
      TELEGRAM_BOT_STATE_FILE: ${TELEGRAM_BOT_STATE_FILE:-/app/data/telegram_bot_listener/state.json}
      TELEGRAM_BOT_POLL_TIMEOUT_SECONDS: ${TELEGRAM_BOT_POLL_TIMEOUT_SECONDS:-10}
      EVENTS_ENGINE_URL: http://events-engine:8789
      TARGET_AGENT_SLUG: ${TARGET_AGENT_SLUG:-secretary}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      NO_PROXY: localhost,127.0.0.1,orchestra-agents,orchestra-threads,events-engine,telegram-events,telegram-bot-listener,postgres,langfuse-postgres,langfuse
    volumes:
      - ./data:/app/data
    command:
      - python
      - -m
      - core.telegram_bot_listener.service_main
    restart: unless-stopped

  telegram-bot-mcp:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      telegram-bot-listener:
        condition: service_started
    networks:
      - default
    environment:
      PYTHONPATH: /app/src
      TELEGRAM_BOT_LISTENER_URL: http://telegram-bot-listener:8791
      TELEGRAM_BOT_LISTENER_API_TOKEN: ${TELEGRAM_BOT_LISTENER_API_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command:
      - python
      - -m
      - telegram_bot_mcp
    restart: unless-stopped
    stdin_open: true
    tty: false

  odinykt:
    <<: *agent-common
    hostname: odinykt
    command:
      - python
      - -m
      - core.orchestra_thread.agent_cli
      - --slug
      - odinykt
      - --service-url
      - http://orchestra-threads:8788
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8787"
      - --advertise-host
      - odinykt

  specialist:
    <<: *agent-common
    hostname: specialist
    command:
      - python
      - -m
      - core.orchestra_thread.agent_cli
      - --slug
      - specialist
      - --service-url
      - http://orchestra-threads:8788
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8787"
      - --advertise-host
      - specialist

  test:
    build: .
    image: orchestra-threads:${OT_TAG:-local}
    depends_on:
      postgres:
        condition: service_healthy
      orchestra-memory:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/src
      ORCHESTRA_THREADS_TEST_DATABASE_URL: postgresql://orchestra:orchestra@postgres:5432/orchestra_threads
    command:
      - python
      - -m
      - unittest
      - -v
      - core.orchestra_thread.tests.test_e2e_mvp
      - core.orchestra_thread.tests.test_mcp_server
      - core.orchestra_thread.tests.test_agent_cli
      - core.orchestra_agents.tests.test_manifest_registry
      - core.orchestra_agents.tests.test_docker_driver
      - core.orchestra_agents.tests.test_runtime_contract
      - core.orchestra_agents.tests.test_scaffold
      - core.orchestra_agents.tests.test_agent_mux_template
      - core.orchestra_agents.tests.test_sgr_example
      - core.orchestra_agents.tests.test_sgr_wave1
      - core.orchestra_agents.tests.test_sgr_internal_tools
      - core.orchestra_agents.tests.test_sgr_status_and_config
      - core.orchestra_agents.tests.test_service
      - core.orchestra_memory.tests.test_memory_service
      - core.orchestra_memory.tests.test_memory_mcp_server
      - core.telegram_bot_listener.tests.test_service_integration
      - telegram_bot_mcp.tests.test_mcp_server
      - core.scheduler_cron.tests.test_config
      - core.scheduler_cron.tests.test_executor_helpers
      - core.scheduler_cron.tests.test_scheduler_support
      - core.scheduler_cron.tests.test_store
      - core.scheduler_cron.tests.test_bootstrap
      - core.scheduler_cron.tests.test_service_integration
      - core.scheduler_cron.tests.test_executor_runtime
      - core.scheduler_cron.tests.test_scheduler_engine
      - core.scheduler_cron.tests.test_e2e_acceptance
    init: true
    restart: "no"
    profiles:
      - test

  mux-smoke:
    build:
      context: .
      dockerfile: Dockerfile.agent_mux_runtime
    image: orchestra-agent-mux-runtime:latest
    environment:
      PYTHONPATH: /workspace/src
      LLM_PROXY_URL: http://host.docker.internal:8104
      LLM_PROXY_API_KEY: ${OMNIROUTE_API_KEY:-llm-proxy}
      OT_SMOKE_MODELS_URL: http://host.docker.internal:20229/v1/models
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - .:/workspace
    working_dir: /workspace
    command:
      - python
      - -m
      - core.orchestra_agents.tests.smoke_agent_mux_real_inference
    init: true
    restart: "no"
    profiles:
      - test

volumes:
  vault-data:
  postgres-data:
  orchestra-memory-data:
